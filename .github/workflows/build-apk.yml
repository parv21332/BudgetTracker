name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # Manual trigger button

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Code checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Java 17 setup
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Android SDK setup
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 4. Gradle cache (speed up builds)
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 5. Make gradlew executable
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 6. Build Debug APK (Fix added here using safe memory flags)
      - name: Build Debug APK
        env:
          _JAVA_OPTIONS: "-Xmx2g -XX:MaxMetaspaceSize=512m"
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g"
        run: ./gradlew assembleDebug --stacktrace

      # 7. Upload APK as artifact
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: BudgetTracker-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 8. Show APK size
      - name: Show APK info
        run: |
          echo "APK built successfully!"
          ls -lh app/build/outputs/apk/debug/